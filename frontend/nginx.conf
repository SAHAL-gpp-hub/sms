server {
    listen 80;
    server_name iqraschool.in www.iqraschool.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name iqraschool.in www.iqraschool.in;

    ssl_certificate /etc/letsencrypt/live/iqraschool.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iqraschool.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    location /api/v1/payments/webhook {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }
}
