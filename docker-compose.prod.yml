services:
  db:
    ports: []
    restart: always

  backend:
    ports: []
    restart: always
    environment:
      REGISTRATION_ENABLED: "false"
      DB_ECHO: "false"

  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
