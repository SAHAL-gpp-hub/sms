server {
    listen 80;
    server_name localhost;

    # ── HTTPS / TLS NOTE ───────────────────────────────────────────────────
    # Step 4.6: TLS termination is REQUIRED before any production deployment.
    # Without HTTPS, the JWT access token is transmitted in plaintext and can
    # be intercepted by any network observer (coffee-shop Wi-Fi, ISP, etc.).
    #
    # Recommended approach — certbot + Let's Encrypt:
    #   1. Install certbot:  apt install certbot python3-certbot-nginx
    #   2. Obtain a cert:    certbot --nginx -d your.domain.com
    #   3. Certbot will rewrite this file to add the HTTPS server block below.
    #
    # Manual HTTPS server block (add after cert is obtained):
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # Security headers
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Content-Type-Options nosniff always;
    #     add_header X-Frame-Options SAMEORIGIN always;
    #
    #     location / {
    #         root /usr/share/nginx/html;
    #         index index.html;
    #         try_files $uri $uri/ /index.html;
    #     }
    #
    #     location /api/ {
    #         proxy_pass http://backend:8000;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
    #
    # HTTP → HTTPS redirect block (replace the HTTP server block below):
    #
    # server {
    #     listen 80;
    #     server_name your.domain.com;
    #     return 301 https://$host$request_uri;
    # }
    # ───────────────────────────────────────────────────────────────────────

    # Serve the React frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy FastAPI docs (useful during development)
    location /docs {
        proxy_pass http://backend:8000/docs;
    }
}