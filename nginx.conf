server {
    listen 80;
    server_name iqraschool.in www.iqraschool.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name iqraschool.in www.iqraschool.in;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/iqraschool.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iqraschool.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # SEC-05 FIX: OCSP stapling — improves TLS handshake speed and privacy.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # SEC-05 FIX: X-XSS-Protection set to 0 — modern browsers use CSP instead,
    # and a value of "1; mode=block" can actually create XSS vulnerabilities.
    add_header X-XSS-Protection "0" always;

    # SEC-05 FIX: Permissions-Policy — disable sensitive browser features.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # SEC-05 FIX: Updated CSP.
    # - Added wss: to connect-src for WebSocket (/ws/jobs/*).
    # - Removed 'unsafe-inline' from script-src (React build doesn't need it).
    # - Added upgrade-insecure-requests.
    # - Replace REPLACE_WITH_YOUR_REPORT_URI with a real CSP report endpoint if desired.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://iqraschool.in; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # SEC-05 FIX: Hide nginx version from Server header.
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; HTML itself stays short-lived so
        # the browser picks up new deploys quickly.
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10M;

        # SEC-05 FIX: Hide upstream server identification headers.
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;  # keep WS connections alive for up to 5 min
    }

    # ── Razorpay webhook (shorter timeout) ───────────────────────────────────
    location /api/v1/payments/webhook {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10M;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}
