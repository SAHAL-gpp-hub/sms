version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: sms_db
    environment:
      POSTGRES_DB: school_sms
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_user -d school_sms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sms_backend
    environment:
      DATABASE_URL: postgresql://sms_user:sms_pass@db:5432/school_sms
      SECRET_KEY: change-this-in-production
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sms_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: