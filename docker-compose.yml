
# ════════════════════════════════════════════════════════════════════════════
# Iqra School Management System — Docker Compose
#
# FIXES:
#   1. backend now has depends_on: db: condition: service_healthy
#      Previously the backend started immediately and often tried to connect
#      to PostgreSQL before pg was ready, causing "connection refused" errors
#      that looked like DB config problems.
#
#   2. SECRET_KEY is now a long random hex string in the compose file.
#      The old value "change-this-in-production" is a security hole.
#      IMPORTANT: for actual production, move this to a .env file that is
#      NOT committed to git:
#        echo "SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_hex(32))')" >> .env
#
#   3. Added DB_ECHO=false — set to true temporarily to see all SQL queries
#      when debugging "app not talking to DB" issues.
#
#   4. PostgreSQL healthcheck now uses -U sms_user -d school_sms so it
#      actually verifies the school_sms database is accepting connections,
#      not just that the postgres process is running.
#
#   5. Added restart: unless-stopped to all services.
#
#   6. Added PYTHONDONTWRITEBYTECODE and PYTHONUNBUFFERED for clean Docker logs.
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sms_db
    environment:
      POSTGRES_DB:       school_sms
      POSTGRES_USER:     sms_user
      # SECURITY FIX (1.1 + 1.3): password comes from .env, port not exposed.
      # Copy .env.example → .env and set a strong POSTGRES_PASSWORD.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    # SECURITY FIX (1.3): removed "ports: - 5432:5432" — the DB is accessed
    # only by the backend container on the internal Docker bridge network.
    # Exposing 5432 to the host makes the DB reachable from outside Docker.
    restart: unless-stopped
    healthcheck:
      # FIX: test the actual school_sms database, not just the process
      test: ["CMD-SHELL", "pg_isready -U sms_user -d school_sms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # Give Postgres time to initialize on first run

  # ── FastAPI Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms_backend
    environment:
      # SECURITY FIX (1.1): secrets come from .env — never hardcoded.
      # Copy .env.example → .env and fill in DATABASE_URL and SECRET_KEY.
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY:   ${SECRET_KEY}
      DB_ECHO: "false"   # Set to "true" to log all SQL — useful for debugging
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # SECURITY FIX (1.2): set REGISTRATION_ENABLED=true only for first-run
      # setup, then set it back to false (or omit it).
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@school.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-School Portal}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
      NOTIFICATION_WORKER_INTERVAL_SECONDS: ${NOTIFICATION_WORKER_INTERVAL_SECONDS:-10}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v18.0}
      SMS_PROVIDER: ${SMS_PROVIDER:-msg91}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID:-}
      AUTO_SEND_PAYMENT_CONFIRMATION: ${AUTO_SEND_PAYMENT_CONFIRMATION:-true}
      AUTO_SEND_FEE_REMINDERS: ${AUTO_SEND_FEE_REMINDERS:-true}
      AUTO_SEND_LOW_ATTENDANCE_ALERTS: ${AUTO_SEND_LOW_ATTENDANCE_ALERTS:-true}
      LOW_ATTENDANCE_THRESHOLD_PERCENT: ${LOW_ATTENDANCE_THRESHOLD_PERCENT:-75}
      PORTAL_PUBLIC_URL: ${PORTAL_PUBLIC_URL:-https://iqraschool.in/portal}
    # SECURITY FIX (3.5): removed bind-mount ./backend:/app — this overwrites
    # the built image in production and leaks source code to the host path.
    # Use docker-compose.dev.yml (which adds the mount) for local development.
    ports:
      - "8000:8000"
    depends_on:
      db:
        # FIX: wait for DB to pass its healthcheck before starting backend.
        # Previously the backend started before DB was ready, causing:
        #   "could not connect to server: Connection refused"
        #   "Is the server running on host 'db' and accepting TCP/IP connections?"
        condition: service_healthy
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sms_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
