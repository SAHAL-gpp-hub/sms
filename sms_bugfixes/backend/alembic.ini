[alembic]
script_location = alembic

# MINOR 5 FIX: Do NOT hardcode credentials here.
# Previously this was:
#   sqlalchemy.url = postgresql://sms_user:sms_pass@db:5432/school_sms
#
# That committed plaintext credentials to version control — a compliance risk
# for any system handling student personal data.
#
# Instead, read DATABASE_URL from the environment at migration time.
# Set it in your shell or .env before running `alembic upgrade head`:
#   export DATABASE_URL=postgresql://sms_user:sms_pass@db:5432/school_sms
#
# The %(here)s interpolation is Alembic built-in; DATABASE_URL comes from
# the OS environment via python-dotenv loaded in env.py.
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
