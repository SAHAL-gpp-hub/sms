[alembic]
script_location = migrations

# DATABASE URL CONFIGURATION
# --------------------------
# Do NOT hardcode credentials here — that commits them to version control.
#
# Set DATABASE_URL in your environment before running migrations:
#
#   # Local development:
#   export DATABASE_URL=postgresql://sms_user:sms_pass@localhost:5432/school_sms
#   alembic upgrade head
#
#   # Inside Docker (use the service name as hostname):
#   export DATABASE_URL=postgresql://sms_user:sms_pass@db:5432/school_sms
#   alembic upgrade head
#
# The env.py reads DATABASE_URL from the OS environment and injects it here.
# The placeholder value below is intentionally invalid so alembic fails loudly
# if DATABASE_URL is not set, rather than silently connecting to the wrong DB.
#
# PREVIOUS BUG: the placeholder had a UTF-8 checkmark emoji (✅) which made
# the URL unparseable by psycopg2, causing confusing "invalid dsn" errors
# when running alembic outside Docker without DATABASE_URL set.
sqlalchemy.url = postgresql://PLACEHOLDER_SET_DATABASE_URL_ENV_VAR

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
