name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        run: pytest

  frontend-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  sms-tests-api:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-validate]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for backend readiness
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time"
          docker compose logs backend
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sms_tests dependencies
        working-directory: sms_tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sms_tests API suite
        working-directory: sms_tests
        env:
          BASE_URL: http://localhost:8000
          FRONTEND_URL: http://localhost
        run: |
          mkdir -p reports
          pytest -m api --tb=short -v --json-report --json-report-file=reports/report.json

      - name: Upload sms test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sms-tests-reports
          path: sms_tests/reports

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
