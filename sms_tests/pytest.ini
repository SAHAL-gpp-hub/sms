[pytest]
testpaths = tests
markers =
    api: Pure API tests (fast, no browser)
    ui: Browser tests using Playwright
    students: Student management tests
    fees: Fee structure and payment tests
    marks: Marks entry and grade calculation tests
    attendance: Attendance marking and summary tests
    reports: PDF report generation tests
    tc: Transfer certificate tests
    yearend: Academic year and promotion tests
    system: Cross-feature integration tests
    critical: Must-pass core tests
addopts = 
    -v
    --tb=short
    --json-report
    --json-report-file=reports/report.json
    --html=reports/report.html
    --self-contained-html
